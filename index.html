<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dopamine Tactics</title>
  <meta name="description" content="부족전 듀얼 오더용 상대 검색 도구" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="logo">DT</div>
      <h1>Dopamine Tactics</h1>
      <p>부족명, 팀명, 닉네임을 검색하세요.</p>

      <div class="search-box">
        <input id="searchInput" type="search" placeholder="예: 예시부족 / 1팀 / 상대A" autocomplete="off" autofocus />
        <button id="clearBtn" type="button">초기화</button>
      </div>

      <div class="count" id="resultCount">전체 데이터 0명</div>
    </section>

    <section class="results" id="results" aria-live="polite"></section>

    <section class="admin-guide">
      <details>
        <summary>데이터 수정 방법</summary>
        <p><strong>data.json</strong> 파일의 <strong>opponents</strong> 안에 상대 정보를 추가/수정하면 됩니다.</p>
        <pre><code>{
  "id": "OPP-0005",
  "clan": "부족명",
  "team": "팀명",
  "nickname": "닉네임",
  "attributes": "화10",
  "hp": 400,
  "mainPets": ["주요펫1", "주요펫2"]
}</code></pre>
      </details>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
