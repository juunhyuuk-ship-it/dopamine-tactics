<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dopamine Tactics</title>
  <meta name="description" content="부족전 듀얼 오더용 상대 검색 도구" />
  <link rel="stylesheet" href="./style.css?v=perfect2" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="logo">DT</div>
      <h1>Dopamine Tactics</h1>
      <p>부족명, 팀명, 닉네임을 검색하면 상대 정보와 완벽상성 캐릭터만 표시합니다.</p>

      <div class="search-box">
        <input id="searchInput" type="search" placeholder="예: 예시부족 / 1팀 / 상대A" autocomplete="off" autofocus />
        <button id="clearBtn" type="button">초기화</button>
      </div>

      <div class="count">
        <span id="versionBadge">완벽상성 v2</span>
        <span>·</span>
        <span id="dataSource">데이터 확인 중</span>
        <span>·</span>
        <span id="resultCount">전체 데이터 0명</span>
      </div>
    </section>

    <section class="results" id="results" aria-live="polite"></section>

    <section class="debug-panel" id="debugPanel"></section>

    <section class="team-guide">
      <details>
        <summary>우리팀 속성 기준 보기</summary>
        <div id="teamList" class="team-list"></div>
      </details>
    </section>

    <section class="admin-guide">
      <details>
        <summary>완벽상성 기준</summary>
        <p>상대 속성을 모두 먹는 조합만 표시합니다. 부분적으로만 유리한 캐릭터는 제외합니다.</p>
        <pre><code>상대 지풍 → 필요한 우리 속성 화풍 → 화풍만 표시
상대 지수 → 필요한 우리 속성 지풍 → 지풍만 표시
상대 수화 → 필요한 우리 속성 지수 → 지수만 표시
상대 화풍 → 필요한 우리 속성 수화 → 수화만 표시</code></pre>
      </details>
    </section>
  </main>

  <script src="./config.js?v=perfect2"></script>
  <script src="./script.js?v=perfect2"></script>
</body>
</html>
