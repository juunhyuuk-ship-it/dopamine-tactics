<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dopamine Tactics</title>
  <meta name="description" content="부족전 듀얼 오더용 상대 검색 도구" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="logo">DT</div>
      <h1>Dopamine Tactics</h1>
      <p>부족명, 팀명, 닉네임을 검색하세요.</p>

      <div class="search-box">
        <input id="searchInput" type="search" placeholder="예: 예시부족 / 1팀 / 상대A" autocomplete="off" autofocus />
        <button id="clearBtn" type="button">초기화</button>
      </div>

      <div class="count" id="resultCount">데이터 불러오는 중...</div>
      <div class="source-status" id="sourceStatus"></div>
    </section>

    <section class="results" id="results" aria-live="polite"></section>

    <section class="admin-guide">
      <details>
        <summary>스프레드시트 연동 방법</summary>
        <p>Google Sheets에서 <strong>부족명 / 팀명 / 닉네임 / 속성 / 체력 / 주요펫</strong> 컬럼을 만든 뒤 CSV로 게시하세요.</p>
        <p>게시한 CSV 주소를 <strong>config.js</strong>의 <code>window.DOPAMINE_SHEET_CSV_URL</code>에 붙여넣으면 됩니다.</p>
      </details>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./script.js"></script>
</body>
</html>
