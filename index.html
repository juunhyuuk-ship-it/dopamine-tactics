<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dopamine Tactics</title>
  <meta name="description" content="부족전 듀얼 오더용 상대 검색 도구" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="logo">DT</div>
      <h1>Dopamine Tactics</h1>
      <p>부족명, 팀명, 닉네임을 검색하면 상대 정보와 유리한 우리팀 캐릭터를 바로 확인합니다.</p>

      <div class="search-box">
        <input id="searchInput" type="search" placeholder="예: 예시부족 / 1팀 / 상대A" autocomplete="off" autofocus />
        <button id="clearBtn" type="button">초기화</button>
      </div>

      <div class="count">
        <span id="dataSource">데이터 확인 중</span>
        <span>·</span>
        <span id="resultCount">전체 데이터 0명</span>
      </div>
    </section>

    <section class="results" id="results" aria-live="polite"></section>

    <section class="debug-panel" id="debugPanel"></section>

    <section class="team-guide">
      <details>
        <summary>우리팀 속성 기준 보기</summary>
        <div id="teamList" class="team-list"></div>
      </details>
    </section>

    <section class="admin-guide">
      <details>
        <summary>데이터 수정 방법</summary>
        <p><strong>Google Sheets</strong>에서 아래 컬럼만 유지하면 됩니다.</p>
        <pre><code>부족명, 팀명, 닉네임, 속성, 체력, 주요펫</code></pre>
        <p>우리팀 속성은 <strong>config.js</strong>의 <strong>DOPAMINE_TEAM_MEMBERS</strong>에서 수정할 수 있습니다.</p>
      </details>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./script.js"></script>
</body>
</html>
